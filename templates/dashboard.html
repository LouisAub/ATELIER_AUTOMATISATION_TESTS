<!doctype html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>
  <h1>Résultats des tests</h1>

  <table border="1">
    <tr>
      <th>ID</th>
      <th>Time</th>
      <th>Latency (ms)</th>
      <th>Status</th>
    </tr>

    {% for row in rows %}
    <tr>
      <td>{{ row[0] }}</td>
      <td>{{ row[1] }}</td>
      <td>{{ row[2] }}</td>
      <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}

  </table>
</body>
</html>
