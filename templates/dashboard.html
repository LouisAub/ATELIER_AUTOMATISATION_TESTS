<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard API Tests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            min-width: 150px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        .PASS {
            color: green;
            font-weight: bold;
        }

        .FAIL {
            color: orange;
            font-weight: bold;
        }

        .ERROR {
            color: red;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #555;
        }
    </style>
</head>

<body>

<h1>Dashboard API Tests</h1>

<a class="btn" href="/run">Lancer un test</a>

<div class="summary">
    <div class="card">
        <strong>Total runs</strong><br>
        {{ rows|length }}
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>Latency (ms)</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for row in rows %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ "%.2f"|format(row[2]) }}</td>
            <td class="{{ row[3] }}">{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
